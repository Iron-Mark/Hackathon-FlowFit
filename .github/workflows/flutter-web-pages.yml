name: Flutter Web Pages

on:
  pull_request:
    paths:
      - ".github/workflows/flutter-web-pages.yml"
      - "lib/**"
      - "pubspec.lock"
      - "pubspec.yaml"
      - "scripts/store_release_build.ps1"
      - "scripts/verify_web_deployment.ps1"
      - "web/**"
  push:
    branches:
      - main
      - "supabase/**"
    paths:
      - ".github/workflows/flutter-web-pages.yml"
      - "lib/**"
      - "pubspec.lock"
      - "pubspec.yaml"
      - "scripts/store_release_build.ps1"
      - "scripts/verify_web_deployment.ps1"
      - "web/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy-ready:
    name: Check web deploy readiness
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check production web deploy variables
        id: check
        shell: bash
        env:
          FLOWFIT_PUBLIC_WEB_BASE_URL: ${{ vars.FLOWFIT_PUBLIC_WEB_BASE_URL }}
          FLOWFIT_SUPPORT_EMAIL_VERIFIED: ${{ vars.FLOWFIT_SUPPORT_EMAIL_VERIFIED }}
          FLOWFIT_SUPPORT_EMAIL: ${{ vars.FLOWFIT_SUPPORT_EMAIL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          support_email="${FLOWFIT_SUPPORT_EMAIL,,}"
          public_web_base_url="${FLOWFIT_PUBLIC_WEB_BASE_URL,,}"
          supabase_url="${SUPABASE_URL,,}"
          publishable_key="${SUPABASE_PUBLISHABLE_KEY,,}"
          if [[ "${FLOWFIT_SUPPORT_EMAIL_VERIFIED}" == "true" &&
                -n "${FLOWFIT_PUBLIC_WEB_BASE_URL}" &&
                "${FLOWFIT_PUBLIC_WEB_BASE_URL}" == https://* &&
                "${public_web_base_url}" != *localhost* &&
                "${public_web_base_url}" != *".example"* &&
                "${public_web_base_url}" != *".invalid"* &&
                "${public_web_base_url}" != *".test"* &&
                "${FLOWFIT_PUBLIC_WEB_BASE_URL}" != *"?"* &&
                "${FLOWFIT_PUBLIC_WEB_BASE_URL}" != *"#"* &&
                -n "${FLOWFIT_SUPPORT_EMAIL}" &&
                "${support_email}" != "support@flowfit.com" &&
                "${supabase_url}" =~ ^https://[a-z0-9-]+\.supabase\.co$ &&
                "${supabase_url}" != *dnasghxxqwibwqnljvxr* &&
                "${supabase_url}" != *project_ref* &&
                "${supabase_url}" != *replace_with* &&
                "${supabase_url}" != *placeholder* &&
                "${SUPABASE_PUBLISHABLE_KEY}" == sb_publishable_* &&
                "${publishable_key}" != *...* &&
                "${publishable_key}" != *replace_with* &&
                "${publishable_key}" != *your_* &&
                "${publishable_key}" != *sb_secret* &&
                "${publishable_key}" != *service_role* ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping GitHub Pages deployment because production web deploy variables are not configured."

  deploy:
    name: Build and Deploy Flutter Web
    needs: deploy-ready
    if: >
      needs.deploy-ready.outputs.ready == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FLOWFIT_PUBLIC_WEB_BASE_URL: ${{ vars.FLOWFIT_PUBLIC_WEB_BASE_URL }}
      FLOWFIT_WEB_BASE_HREF: ${{ vars.FLOWFIT_WEB_BASE_HREF }}
      FLOWFIT_MAP_TILE_URL_TEMPLATE: ${{ vars.FLOWFIT_MAP_TILE_URL_TEMPLATE }}
      FLOWFIT_MAP_TILE_SUBDOMAINS: ${{ vars.FLOWFIT_MAP_TILE_SUBDOMAINS }}
      FLOWFIT_SUPPORT_EMAIL: ${{ vars.FLOWFIT_SUPPORT_EMAIL }}
      FLOWFIT_SUPPORT_EMAIL_VERIFIED: ${{ vars.FLOWFIT_SUPPORT_EMAIL_VERIFIED }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Validate web deploy inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${FLOWFIT_PUBLIC_WEB_BASE_URL}" ]]; then
            echo "FLOWFIT_PUBLIC_WEB_BASE_URL repo variable is required." >&2
            exit 1
          fi
          if [[ "${FLOWFIT_PUBLIC_WEB_BASE_URL}" != https://* ]]; then
            echo "FLOWFIT_PUBLIC_WEB_BASE_URL must be an HTTPS URL." >&2
            exit 1
          fi
          public_web_base_url="${FLOWFIT_PUBLIC_WEB_BASE_URL,,}"
          if [[ "${public_web_base_url}" == *localhost* ||
                "${public_web_base_url}" == *".example"* ||
                "${public_web_base_url}" == *".invalid"* ||
                "${public_web_base_url}" == *".test"* ||
                "${FLOWFIT_PUBLIC_WEB_BASE_URL}" == *"?"* ||
                "${FLOWFIT_PUBLIC_WEB_BASE_URL}" == *"#"* ]]; then
            echo "FLOWFIT_PUBLIC_WEB_BASE_URL must be a deployed production HTTPS URL without query strings or fragments." >&2
            exit 1
          fi
          if [[ "${FLOWFIT_SUPPORT_EMAIL_VERIFIED}" != "true" ]]; then
            echo "Set FLOWFIT_SUPPORT_EMAIL_VERIFIED=true only after the configured support inbox is receiving mail." >&2
            exit 1
          fi
          if [[ -z "${FLOWFIT_SUPPORT_EMAIL}" ]]; then
            echo "FLOWFIT_SUPPORT_EMAIL repo variable is required and must point to a verified deliverable inbox." >&2
            exit 1
          fi
          if [[ "${FLOWFIT_SUPPORT_EMAIL,,}" == "support@flowfit.com" ]]; then
            echo "support@flowfit.com is the reserved source replacement token and is not a verified production inbox." >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_URL}" ]]; then
            echo "SUPABASE_URL repo variable is required." >&2
            exit 1
          fi
          supabase_url="${SUPABASE_URL,,}"
          if ! [[ "${supabase_url}" =~ ^https://[a-z0-9-]+\.supabase\.co$ ]]; then
            echo "SUPABASE_URL must be a valid Supabase Project URL." >&2
            exit 1
          fi
          if [[ "${supabase_url}" == *dnasghxxqwibwqnljvxr* ||
                "${supabase_url}" == *project_ref* ||
                "${supabase_url}" == *replace_with* ||
                "${supabase_url}" == *placeholder* ]]; then
            echo "SUPABASE_URL must not be a placeholder or retired FlowFit project URL." >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_PUBLISHABLE_KEY}" ]]; then
            echo "SUPABASE_PUBLISHABLE_KEY repo variable is required." >&2
            exit 1
          fi
          publishable_key="${SUPABASE_PUBLISHABLE_KEY,,}"
          if [[ "${SUPABASE_PUBLISHABLE_KEY}" != sb_publishable_* ||
                "${publishable_key}" == *...* ||
                "${publishable_key}" == *replace_with* ||
                "${publishable_key}" == *your_* ||
                "${publishable_key}" == *sb_secret* ||
                "${publishable_key}" == *service_role* ]]; then
            echo "SUPABASE_PUBLISHABLE_KEY is missing, placeholder-shaped, or not a publishable client key." >&2
            exit 1
          fi

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build production web artifact
        shell: pwsh
        run: pwsh -NoProfile -File scripts/store_release_build.ps1 -Target Web -SkipFlutterPubGet

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed GitHub Pages site
        shell: pwsh
        run: >
          pwsh -NoProfile -File scripts/verify_web_deployment.ps1
          -BaseUrl '${{ steps.deployment.outputs.page_url }}'
          -SupportEmail "$env:FLOWFIT_SUPPORT_EMAIL"
          -CompareBuildWebPath build/web
          -OutFile build/web-pages-deployment-verification.json

      - name: Upload GitHub Pages verification evidence
        uses: actions/upload-artifact@v7
        with:
          name: flowfit-github-pages-verification
          path: build/web-pages-deployment-verification.json
          if-no-files-found: error
